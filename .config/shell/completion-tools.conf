# vi:ts=4:sw=4:noexpandtab
#
# .config/shell/completion-tools.conf
#
# Data table consumed by rc.d/70-completions.sh.  This file is never
# sourced for side effects -- both consumers read it line by line.
#
# Format (one tool per line, empty lines and '#' comments ignored):
#
#   name|template|shells|zsh-strategy
#
#   name          Command name the completion is registered for.  Also
#                 used as the `command -v` guard, so rows for tools
#                 that are not installed are inert.
#   template      Command that prints the tool's completion script on
#                 stdout.  The literal word SHELL is replaced with
#                 "bash" or "zsh" at load time.
#   shells        Space-separated list of shells the row applies to:
#                 "bash", "zsh", or "bash zsh".
#   zsh-strategy  How Zsh loads the row ("-" for bash-only rows):
#                   compdef  The generated script is safe to eval
#                            directly and defines a `_<name>` function
#                            (clap/Cobra/usage-cli style).  A lazy
#                            dispatcher stub evals it on the first
#                            completion attempt.
#                   fpath    The generated script is a classic
#                            '#compdef'-headed autoload file whose
#                            body runs top-level completion code, so
#                            direct eval breaks.  It is written to
#                            $ZSH_CACHE_HOME/_<name> before compinit
#                            (regenerated when the binary is newer)
#                            and autoloaded natively.
#
# Bash always uses one strategy: a lazy `complete -F` dispatcher stub
# that evals the generated script (every listed tool's bash output
# self-registers its real completer) and returns 124 so readline
# retries with the real completer.
#
# To add a tool: add one line here.  Pick the zsh-strategy by
# inspecting the tail of `<template with SHELL=zsh>`: a guarded
# "$funcstack[1]" check or a plain set of function definitions means
# compdef; an unconditional trailing `_<name> "$@"` call or top-level
# completion code means fpath.
#
# Special cases handled directly in 70-completions.sh, not here:
# aws (registers the aws_completer binary via `complete -C`), pkl's
# Zsh side (its "zsh" output is a bash-style script that runs its own
# compinit), and fzf (its --bash/--zsh output is whole-shell
# integration -- key bindings plus trigger-based completion -- that
# only works when eval'd eagerly at startup).

mise|mise completions SHELL|bash zsh|compdef
starship|starship completions SHELL|bash zsh|compdef
uv|uv generate-shell-completion SHELL|bash zsh|compdef
gh|gh completion -s SHELL|bash zsh|compdef
fnox|fnox completion SHELL|bash zsh|compdef
pitchfork|pitchfork completion SHELL|bash zsh|compdef
tinty|tinty generate-completion zsh|zsh|compdef
git-lfs|git lfs completion SHELL|bash zsh|compdef
yq|yq completion SHELL|bash zsh|compdef
hk|hk completion SHELL|bash zsh|compdef
hwatch|hwatch --completion SHELL|bash zsh|compdef
tree-sitter|tree-sitter complete --shell SHELL|bash zsh|compdef
ast-grep|ast-grep completions SHELL|bash zsh|compdef
delta|delta --generate-completion SHELL|bash zsh|compdef
# openspec prints a first-run telemetry notice on stdout, which would
# corrupt the eval'd script; OPENSPEC_TELEMETRY=0 suppresses it.
openspec|env OPENSPEC_TELEMETRY=0 openspec completion generate SHELL|bash zsh|compdef

# fpath rows: '#compdef' autoload files with top-level completion
# code; see the strategy notes above.
just|just --completions SHELL|bash zsh|fpath
doggo|doggo completions SHELL|bash zsh|fpath
gum|gum completion SHELL|bash zsh|fpath
bat|bat --completion SHELL|bash zsh|fpath

# Bash-only rows.  npm ships a real Zsh completion (`_npm`) as part
# of Zsh itself (Completion/Unix); node's Zsh completion (`_node`)
# instead comes from the separate zsh-completions package, not from
# Zsh itself, so it is only present if that package is installed.
# Both need only their Bash side generated here.  pkl's Bash output
# is a normal self-registering script; its Zsh side is
# special-cased in 70-completions.sh (see above).
node|node --completion-bash|bash|-
npm|npm completion|bash|-
pkl|pkl shell-completion SHELL|bash|-

# Not currently installed on this host; rows are inert until they
# are.  ruff's shape matches the other clap tools; hugo's matches
# the other Cobra tools.
ruff|ruff generate-shell-completion SHELL|bash zsh|compdef
hugo|hugo completion SHELL|bash zsh|compdef
